name: WLED compile

on:
    workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
    - name: Run PlatformIO nodemcuv2
      run: |
        rm /tmp/mm.zip || true
        wget https://github.com/atuline/WLED/archive/refs/heads/dev.zip -O /tmp/mm.zip
        unzip -o /tmp/mm.zip -d /tmp
        rm /tmp/wledfoldername || true
        find /tmp -maxdepth 1 -name "WLED-*" -type d >> /tmp/wledfoldername
        cd `cat /tmp/wledfoldername`
        echo '[env:custom_build]' >>platformio.ini
        echo 'extends = env:nodemcuv2' >>platformio.ini
        echo 'build_flags = ${env:nodemcuv2.build_flags} -D USERMOD_MULTI_RELAY -D RGB_ROTARY_ENCODER' >>platformio.ini
        echo 'lib_deps = ' >>platformio.ini
        echo '  ${env:nodemcuv2.lib_deps}' >>platformio.ini
        echo '  lennarthennigs/ESP Rotary@^1.5.0' >>platformio.ini
        
        pio run -e custom_build || pio run -e custom_build || true
    - name: Copy Files nodemcuv2
      run: |
        cd $GITHUB_WORKSPACE
        WLEDFOLDERNAME=`cat /tmp/wledfoldername`
        cp ${WLEDFOLDERNAME}/build_output/firmware/custom_build.bin $GITHUB_WORKSPACE/custom_build_nodemcuv2.bin || true
        date -I | tr -d '\n' >$GITHUB_WORKSPACE/last_update_date.txt
    - name: Commit Files nodemcuv2
      run: |
        cd $GITHUB_WORKSPACE
        git config user.name "GitHub Actions Bot"
        git config user.email "<>"
        git add $GITHUB_WORKSPACE/custom_build_nodemcuv2.bin || true
        git add $GITHUB_WORKSPACE/last_update_date.txt || true
        git commit -m "Commit Custom Build" || true
        git push origin main || true
