name: WLED compile

on:
    workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio
    - name: Run PlatformIO esp8266_2m
      run: |
        wget https://github.com/Aircoookie/WLED/archive/refs/heads/main.zip -O /tmp/mm.zip
        unzip /tmp/mm.zip -d /tmp
        rm /tmp/mm.zip
        find /tmp -maxdepth 1 -name "WLED-*" -type d >> /tmp/wledfoldername
        cd `cat /tmp/wledfoldername`
        echo '[env:custom_build]' >>platformio.ini
        echo 'extends = env:esp8266_2m' >>platformio.ini
        
        pio run -e custom_build || pio run -e custom_build
    - name: Copy Files esp8266_2m
      run: |
        cd $GITHUB_WORKSPACE
        WLEDFOLDERNAME=`cat /tmp/wledfoldername`
        cp ${WLEDFOLDERNAME}/build_output/firmware/custom_build.bin $GITHUB_WORKSPACE/custom_build_esp8266_2m.bin
        date -I | tr -d '\n' >$GITHUB_WORKSPACE/last_update_date.txt
        rm -rf ${WLEDFOLDERNAME}
    - name: Commit Files esp8266_2m
      run: |
        cd $GITHUB_WORKSPACE
        git config user.name "GitHub Actions Bot"
        git config user.email "<>"
        git add $GITHUB_WORKSPACE/custom_build_esp8266_2m.bin
        git add $GITHUB_WORKSPACE/last_update_date.txt
        git commit -m "Commit Custom Build"
        git push origin main
